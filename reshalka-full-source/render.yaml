services:
  - type: web
    name: reshalka-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx src/server.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://reshalka.app
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
    healthCheckPath: /health
